name: Build GiftcardSite

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v4

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Make gradlew executable
      run: chmod +x GiftcardSite/gradlew

    - name: Compile project
      run: cd GiftcardSite && ./gradlew assembleDebug
